<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1F2E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rack Scanner</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:           #1A1F2E;
  --bg-card:      #242A3A;
  --bg-modal:     #0D1017;
  --border:       #2E3650;
  --amber:        #FFA500;
  --amber-dim:    #CC8400;
  --green:        #00C851;
  --red:          #FF4444;
  --text-primary: #F0F2F8;
  --text-muted:   #7A84A0;
  --font-ui:      'Inter', system-ui, sans-serif;
  --font-mono:    'Roboto Mono', 'Courier New', monospace;
  --radius-lg:    16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-ui);
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Rack Label Bar ── */
.rack-label-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--bg-card);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  border-left: 5px solid var(--amber);
  transition: border-left-color 0.4s;
}

.rack-label-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  flex-shrink: 0;
  min-width: 90px;
}

.rack-label-value {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.04em;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.rack-label-value.no-rack {
  color: var(--text-muted);
  font-size: 16px;
}

.rack-label-icon {
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: color 0.3s;
}

.rack-label-icon.active {
  color: var(--green);
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* ── Main Content ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px 24px;
}

/* ── Start Button ── */
.btn-start {
  width: 100%;
  max-width: 360px;
  padding: 28px 20px;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 900;
  font-size: 24px;
  letter-spacing: 0.08em;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,165,0,0.35);
  border-left: 5px solid var(--amber-dim);
  touch-action: manipulation;
  transition: transform 0.1s;
  -webkit-user-select: none;
  user-select: none;
}

.btn-start:active { transform: scale(0.97); }

.btn-start-hint {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  letter-spacing: 0.03em;
}

/* ── Scan Modal (camera) ── */
.scan-modal {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: var(--bg-modal);
  display: flex;
  flex-direction: column;
}

.scan-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}

.scan-modal-mode {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: var(--amber);
}

.btn-close {
  background: var(--border);
  border: none;
  color: var(--text-primary);
  font-size: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}

.scan-modal-body {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#html5qr-code-full-region {
  width: 100% !important;
  height: 100% !important;
  border: none !important;
}

#html5qr-code-full-region video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
}

#html5qr-code-full-region img { display: none !important; }
#html5qr-code-full-region__dashboard { display: none !important; }

.scan-modal-hint {
  padding: 16px 20px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* ── Fullscreen Overlay (success / saving) ── */
.fs-overlay {
  position: fixed;
  inset: 0;
  z-index: 400;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 40px 32px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

.fs-overlay.show {
  opacity: 1;
  pointer-events: all;
}

/* Green success overlay */
.fs-overlay.success {
  background: #00A843;
}

/* Dark saving overlay */
.fs-overlay.saving {
  background: rgba(13, 16, 23, 0.96);
}

/* ── Success tick ── */
.fs-tick {
  width: 110px;
  height: 110px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  line-height: 1;
  animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes pop-in {
  0%   { transform: scale(0.4); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}

.fs-title {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.02em;
}

.fs-subtitle {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.04em;
  word-break: break-all;
}

.fs-meta {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.03em;
}

/* ── Finish Scan Button (on success overlay) ── */
.btn-finish {
  margin-top: 12px;
  padding: 18px 40px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 0.06em;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
  transition: background 0.15s;
}

.btn-finish:active { background: rgba(255,255,255,0.35); }

/* ── Confirmation overlay ── */
.fs-overlay.confirm {
  background: #1A1F2E;
}

.fs-confirm-code {
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px 28px;
  word-break: break-all;
  letter-spacing: 0.04em;
}

.fs-confirm-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 320px;
}

.btn-confirm-yes {
  padding: 20px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 0.06em;
  cursor: pointer;
  touch-action: manipulation;
}

.btn-confirm-no {
  padding: 20px;
  background: transparent;
  color: var(--red);
  border: 2px solid var(--red);
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: 0.06em;
  cursor: pointer;
  touch-action: manipulation;
}

/* ── Flashlight button ── */
.btn-torch {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.25);
  color: var(--text-primary);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  touch-action: manipulation;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}

.btn-torch.on {
  background: rgba(255,165,0,0.25);
  border-color: var(--amber);
}

/* ── Rack banner shown below label bar after rack scanned ── */
.rack-banner {
  background: var(--green);
  color: #000;
  text-align: center;
  padding: 10px 20px;
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.06em;
  display: none;
  word-break: break-all;
}

.rack-banner.show { display: block; }

/* ── Manual entry link ── */
.manual-link {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  text-decoration: underline;
  letter-spacing: 0.02em;
  cursor: pointer;
  touch-action: manipulation;
  padding: 8px;
}

.manual-link:active { color: var(--amber); }

/* ── Manual entry overlay ── */
.fs-overlay.manual {
  background: var(--bg);
}

.manual-input-wrap {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.manual-input {
  width: 100%;
  padding: 18px 16px;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  text-align: center;
  text-transform: uppercase;
}

.manual-input:focus {
  outline: none;
  border-color: var(--amber);
}

.manual-input.error {
  border-color: var(--red);
}

.manual-error-msg {
  font-size: 13px;
  color: var(--red);
  font-weight: 600;
  min-height: 18px;
  text-align: center;
}

.manual-buttons {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}

.btn-manual-submit {
  flex: 1;
  padding: 18px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 0.05em;
  cursor: pointer;
  touch-action: manipulation;
}

.btn-manual-cancel {
  flex: 1;
  padding: 18px;
  background: transparent;
  color: var(--text-muted);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-ui);
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.05em;
  cursor: pointer;
  touch-action: manipulation;
}

/* ── Saving spinner ── */
.fs-spinner {
  width: 72px;
  height: 72px;
  border: 5px solid rgba(255,255,255,0.15);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.fs-saving-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

  <!-- Always-visible rack bar -->
  <div class="rack-label-bar" id="rackLabelBar">
    <span class="rack-label-eyebrow">CURRENT RACK</span>
    <span class="rack-label-value no-rack" id="currentRackDisplay">NONE</span>
    <span class="rack-label-icon" id="rackStatusIcon">⬤</span>
  </div>

  <!-- Main screen — single button -->
  <main class="main-content">
    <button class="btn-start" onclick="startScan('rack')">START SCANNING</button>
    <p class="btn-start-hint" id="startHint">Tap to scan a rack first</p>
    <button class="manual-link" onclick="openManualEntry('rack')">Type rack number manually</button>
  </main>

  <!-- Rack banner — bold rack number shown below label bar -->
  <div class="rack-banner" id="rackBanner"></div>

  <!-- Camera modal -->
  <div class="scan-modal" id="scanModal" style="display:none;">
    <div class="scan-modal-header">
      <span class="scan-modal-mode" id="scanModalMode">SCAN RACK</span>
      <button class="btn-torch" id="btnTorch" onclick="toggleTorch()" title="Toggle flashlight">🔦</button>
      <button class="btn-close" onclick="closeScanner()">✕</button>
    </div>
    <div class="scan-modal-body">
      <div id="html5qr-code-full-region"></div>
    </div>
    <div class="scan-modal-hint" id="scanModalHint">Point camera at rack QR code</div>
    <button class="manual-link" onclick="openManualEntry(scanMode)" style="background:var(--bg-card);">⌨ Barcode damaged? Enter manually</button>
  </div>

  <!-- Fullscreen saving overlay -->
  <div class="fs-overlay saving" id="fsSaving">
    <div class="fs-spinner"></div>
    <div class="fs-saving-text">SAVING…</div>
  </div>

  <!-- Fullscreen success overlay -->
  <div class="fs-overlay success" id="fsSuccess">
    <div class="fs-tick">✓</div>
    <div class="fs-title" id="fsTitle">RACK SCANNED</div>
    <div class="fs-subtitle" id="fsSubtitle"></div>
    <div class="fs-meta" id="fsMeta"></div>
    <button class="btn-finish" id="btnFinish" onclick="finishRack()" style="display:none;">
      FINISH THIS RACK
    </button>
  </div>

<!-- Fullscreen confirmation overlay for unknown barcodes -->
  <div class="fs-overlay confirm" id="fsConfirm" style="">
    <div class="fs-tick" style="background:rgba(255,165,0,0.2); font-size:52px;">?</div>
    <div class="fs-title" style="color:var(--amber);">IS THIS A PRODUCT?</div>
    <div class="fs-confirm-code" id="confirmCode"></div>
    <div class="fs-meta" style="color:var(--text-muted);">Unknown barcode format detected.<br>Is this a product you want to save?</div>
    <div class="fs-confirm-buttons">
      <button class="btn-confirm-yes" onclick="confirmProduct()">✓ YES, SAVE IT</button>
      <button class="btn-confirm-no" onclick="rejectProduct()">✕ NO, SCAN AGAIN</button>
    </div>
  </div>

<!-- Fullscreen manual entry overlay -->
  <div class="fs-overlay manual" id="fsManual">
    <div class="fs-title" id="manualTitle" style="color:var(--amber);">ENTER RACK NUMBER</div>
    <div class="manual-input-wrap">
      <input type="text" class="manual-input" id="manualInput" placeholder="e.g. S4-C97-6430-A" autocomplete="off" autocapitalize="characters" />
      <div class="manual-error-msg" id="manualError"></div>
    </div>
    <div class="manual-buttons">
      <button class="btn-manual-cancel" onclick="closeManualEntry()">CANCEL</button>
      <button class="btn-manual-submit" onclick="submitManualEntry()">SUBMIT</button>
    </div>
  </div>

<script>
// ▶ YOUR APPS SCRIPT URL
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwaoyBOBULcQ61MhcGpkyWcALuAD3bXLoK-rHOK0zcNWy-pgMlnEqgk_PMbxMpl2H-0RQ/exec';

// ── State ──
let currentRack  = null;
let scanMode     = null;
let html5QrCode  = null;
let isScanning   = false;
let successTimer = null;   // tracks auto-dismiss timer on product success
let torchOn      = false;  // flashlight state

// ── DOM ──
const rackDisplay    = document.getElementById('currentRackDisplay');
const rackStatusIcon = document.getElementById('rackStatusIcon');
const rackLabelBar   = document.getElementById('rackLabelBar');
const scanModal      = document.getElementById('scanModal');
const scanModalMode  = document.getElementById('scanModalMode');
const scanModalHint  = document.getElementById('scanModalHint');
const startHint      = document.getElementById('startHint');
const fsSaving       = document.getElementById('fsSaving');
const fsSuccess      = document.getElementById('fsSuccess');
const fsTitle        = document.getElementById('fsTitle');
const fsSubtitle     = document.getElementById('fsSubtitle');
const fsMeta         = document.getElementById('fsMeta');
const btnFinish      = document.getElementById('btnFinish');

// ═══════════════════════════════════════════
//  SCANNER
// ═══════════════════════════════════════════

function startScan(mode) {
  scanMode = mode;
  isScanning = false;

  if (mode === 'rack') {
    scanModalMode.textContent = 'SCAN RACK';
    scanModalHint.textContent = 'Point camera at rack QR code';
  } else {
    scanModalMode.textContent = 'SCAN PRODUCT';
    scanModalHint.textContent = `Rack: ${currentRack} · Point at product barcode`;
  }

  scanModal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  setTimeout(initScanner, 100);
}

function initScanner() {
  // Larger scan box = more of the frame is analyzed = easier to land a hit
  // on phones that can't auto-focus precisely or have small/blurry sensors
  const boxSize = Math.min(window.innerWidth, window.innerHeight) * 0.75;

  const config = {
    fps: 10, // lower fps = more processing time per frame = sharper decode on weak CPUs
    qrbox: { width: boxSize, height: boxSize * 0.65 },
    aspectRatio: 1.0,
    disableFlip: false,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
    formatsToSupport: [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
    ],
    // Use the phone's native hardware-accelerated barcode detector when available
    // (modern Android Chrome) — much faster than the pure-JS decoder fallback
    useBarCodeDetectorIfSupported: true,
    rememberLastUsedCamera: true,
    showTorchButtonIfSupported: true,
  };

  // Request a higher-resolution camera stream — low-res streams are the
  // single biggest cause of slow/failed scans on budget phone cameras
  const videoConstraints = {
    facingMode: 'environment',
    width:  { ideal: 1920, min: 1280 },
    height: { ideal: 1080, min: 720 },
    // Ask the camera to continuously refocus — big win for close-up barcode scans
    advanced: [{ focusMode: 'continuous' }],
  };

  html5QrCode = new Html5Qrcode('html5qr-code-full-region', {
    verbose: false,
    formatsToSupport: config.formatsToSupport,
  });

  html5QrCode.start(
    videoConstraints,
    config,
    onScanSuccess,
    () => {}
  ).catch(err => {
    const msg = String(err);
    if (msg.includes('ermission') || msg.includes('NotAllowed')) {
      alert('Camera permission denied. Please allow camera access in your browser settings.');
      closeScanner();
    } else {
      // Fallback: high-res constraints can fail on some older devices —
      // retry once with basic constraints before giving up
      html5QrCode.start(
        { facingMode: 'environment' },
        config,
        onScanSuccess,
        () => {}
      ).catch(() => {
        alert('Camera error. Please try again.');
        closeScanner();
      });
    }
  });
}

// ═══════════════════════════════════════════
//  VALIDATION & CODE PARSING
// ═══════════════════════════════════════════

// Rack: starts with S + digit(s) + hyphen  e.g. S4-C97-6430-A
function isRackCode(code) {
  return /^S[0-9]+-/.test(code);
}

// Known product: starts with B  e.g. B15652X0XOCK or B15652
function isKnownProduct(code) {
  return /^B/i.test(code);
}

// Extract stable product ID — everything before first X
// If no X present, return full code
function extractProductId(code) {
  const xIndex = code.indexOf('X');
  return xIndex !== -1 ? code.substring(0, xIndex) : code;
}

// Pending confirmation state
let pendingCode = null;

function onScanSuccess(decodedText) {
  if (isScanning) return;
  const value = decodedText.trim();

  if (scanMode === 'rack') {
    // In rack mode — only accept rack format
    if (!isRackCode(value)) {
      showScanWarning('Not a valid rack code. Scan the rack QR.');
      return;
    }
    isScanning = true;
    handleRackScan(value);

  } else if (scanMode === 'product') {
    if (isRackCode(value)) {
      // Rack QR scanned in product mode — warn and stay open
      showScanWarning('That is a rack code. Scan a product barcode.');
      return;
    }

    if (isKnownProduct(value)) {
      // Starts with B — accept automatically
      isScanning = true;
      handleProductScan(extractProductId(value));

    } else {
      // Unknown format — pause scanner and ask worker to confirm
      isScanning = true;
      pendingCode = value;
      closeScanner();
      showConfirmation(extractProductId(value));
    }
  }
}

// Show warning in scanner hint bar — scanner stays open
let warnTimer = null;
function showScanWarning(msg) {
  const hint = document.getElementById('scanModalHint');
  const prev = hint.textContent;
  hint.style.color = 'var(--red)';
  hint.textContent = '⚠ ' + msg;
  if (warnTimer) clearTimeout(warnTimer);
  warnTimer = setTimeout(() => {
    hint.style.color = '';
    hint.textContent = prev;
  }, 2000);
}

// Worker confirmed the unknown code is a product
function confirmProduct() {
  hideConfirmation();
  if (pendingCode) {
    handleProductScan(extractProductId(pendingCode));
    pendingCode = null;
  }
}

// Worker rejected — reopen scanner
function rejectProduct() {
  hideConfirmation();
  pendingCode = null;
  isScanning = false;
  startScan('product');
}

function showConfirmation(productId) {
  document.getElementById('confirmCode').textContent = productId;
  document.getElementById('fsConfirm').classList.add('show');
}

function hideConfirmation() {
  document.getElementById('fsConfirm').classList.remove('show');
}

async function closeScanner() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); html5QrCode.clear(); } catch (e) {}
    html5QrCode = null;
  }
  scanModal.style.display = 'none';
  document.body.style.overflow = '';
  scanMode = null;
  isScanning = false;
  // Reset torch state
  torchOn = false;
  const btn = document.getElementById('btnTorch');
  if (btn) { btn.classList.remove('on'); btn.textContent = '🔦'; }
}

// ═══════════════════════════════════════════
//  RACK HANDLER
// ═══════════════════════════════════════════

function handleRackScan(rackCode) {
  currentRack = rackCode;

  // Update rack label bar
  rackDisplay.textContent = rackCode;
  rackDisplay.classList.remove('no-rack');
  rackStatusIcon.classList.add('active');
  rackLabelBar.style.borderLeftColor = 'var(--green)';
  startHint.textContent = `Scanning products for ${rackCode}`;

  // Show bold rack banner below label bar
  const banner = document.getElementById('rackBanner');
  banner.textContent = rackCode;
  banner.classList.add('show');

  closeScanner();
  playSound('success');

  // Show fullscreen rack success
  showSuccess({
    title:    'RACK SCANNED',
    subtitle: rackCode,
    meta:     'Opening product scanner…',
    showFinishButton: false,
  });

  // Auto-open product scanner after 1.8s
  setTimeout(() => {
    hideSuccess();
    startScan('product');
  }, 1800);
}

// ═══════════════════════════════════════════
//  PRODUCT HANDLER
// ═══════════════════════════════════════════

async function handleProductScan(barcode) {
  await closeScanner();
  showSaving(true);

  try {
    const result = await saveToSheet(barcode, currentRack);
    showSaving(false);
    playSound(result.result === 'Duplicate' ? 'warning' : 'success');

    const isDupe = result.result === 'Duplicate';

    showSuccess({
      title:    isDupe ? 'ALREADY ASSIGNED' : 'PRODUCT SAVED',
      subtitle: barcode,
      meta:     isDupe
                  ? `Already linked to ${currentRack}`
                  : `Saved to ${currentRack}`,
      showFinishButton: true,
    });

    // Auto-dismiss after 5s and open scanner for next product
    // Timer is cancelled if user taps FINISH THIS RACK
    successTimer = setTimeout(() => {
      hideSuccess();
      startScan('product');
    }, 5000);

  } catch (err) {
    showSaving(false);
    playSound('error');
    alert('Unable to save data. Please try again.');
    // Reopen scanner so worker can retry
    setTimeout(() => startScan('product'), 800);
  }
}

// ═══════════════════════════════════════════
//  FINISH RACK — go back to start
// ═══════════════════════════════════════════

function finishRack() {
  // Cancel auto-dismiss timer so we dont re-open product scanner
  if (successTimer) { clearTimeout(successTimer); successTimer = null; }
  hideSuccess();
  currentRack = null;
  rackDisplay.textContent = 'NONE';
  rackDisplay.classList.add('no-rack');
  rackStatusIcon.classList.remove('active');
  rackLabelBar.style.borderLeftColor = 'var(--amber)';
  startHint.textContent = 'Tap to scan a rack first';
  // Hide rack banner
  document.getElementById('rackBanner').classList.remove('show');
  // Go to rack scan — NOT product scan
  startScan('rack');
}

// ═══════════════════════════════════════════
//  FULLSCREEN OVERLAYS
// ═══════════════════════════════════════════

function showSuccess({ title, subtitle, meta, showFinishButton }) {
  fsTitle.textContent    = title;
  fsSubtitle.textContent = subtitle;
  fsMeta.textContent     = meta;
  btnFinish.style.display = showFinishButton ? 'block' : 'none';
  fsSuccess.classList.add('show');
}

function hideSuccess() {
  fsSuccess.classList.remove('show');
}

function showSaving(show) {
  if (show) fsSaving.classList.add('show');
  else      fsSaving.classList.remove('show');
}

// ═══════════════════════════════════════════
//  SAVE TO GOOGLE SHEETS (JSONP)
// ═══════════════════════════════════════════

function saveToSheet(barcode, rack) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now();
    const script = document.createElement('script');

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Request timed out'));
    }, 10000);

    function cleanup() {
      clearTimeout(timer);
      delete window[callbackName];
      if (script.parentNode) document.body.removeChild(script);
    }

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('Script load failed'));
    };

    script.src = `${APPS_SCRIPT_URL}?action=save&barcode=${encodeURIComponent(barcode)}&rack=${encodeURIComponent(rack)}&callback=${callbackName}`;
    document.body.appendChild(script);
  });
}

// ═══════════════════════════════════════════
//  MANUAL ENTRY (same validation rules as scanning)
// ═══════════════════════════════════════════

let manualMode = null; // 'rack' or 'product'

function openManualEntry(mode) {
  // Block manual product entry if no rack is set yet
  if (mode === 'product' && !currentRack) {
    alert('Please scan or enter a rack first.');
    return;
  }

  manualMode = mode || 'rack';

  // Close camera scanner if open
  if (scanModal.style.display === 'flex') {
    closeScanner();
  }

  const title = document.getElementById('manualTitle');
  const input = document.getElementById('manualInput');
  const error = document.getElementById('manualError');

  title.textContent = manualMode === 'rack' ? 'ENTER RACK NUMBER' : 'ENTER PRODUCT BARCODE';
  input.placeholder = manualMode === 'rack' ? 'e.g. S4-C97-6430-A' : 'e.g. B15652 or B15652X0XOCK';
  input.value = '';
  input.classList.remove('error');
  error.textContent = '';

  document.getElementById('fsManual').classList.add('show');
  setTimeout(() => input.focus(), 200);
}

function closeManualEntry() {
  document.getElementById('fsManual').classList.remove('show');
  manualMode = null;
}

function submitManualEntry() {
  const input = document.getElementById('manualInput');
  const error = document.getElementById('manualError');
  const value = input.value.trim().toUpperCase();

  if (!value) {
    error.textContent = 'Please enter a value.';
    input.classList.add('error');
    return;
  }

  if (manualMode === 'rack') {
    // Must match rack format: S + digits + hyphen
    if (!isRackCode(value)) {
      error.textContent = 'Invalid rack format. Must start with S + number + hyphen (e.g. S4-...)';
      input.classList.add('error');
      return;
    }
    closeManualEntry();
    handleRackScan(value);

  } else if (manualMode === 'product') {
    // Reject if it looks like a rack code
    if (isRackCode(value)) {
      error.textContent = 'This looks like a rack code, not a product.';
      input.classList.add('error');
      return;
    }

    closeManualEntry();

    if (isKnownProduct(value)) {
      // Starts with B — accept directly
      handleProductScan(extractProductId(value));
    } else {
      // Unknown format — show same confirmation as camera scan flow
      pendingCode = value;
      showConfirmation(extractProductId(value));
    }
  }
}

// Allow pressing Enter key to submit
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('manualInput');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitManualEntry();
    });
    input.addEventListener('input', () => {
      input.classList.remove('error');
      document.getElementById('manualError').textContent = '';
    });
  }
});

// ═══════════════════════════════════════════
//  FLASHLIGHT / TORCH
// ═══════════════════════════════════════════

async function toggleTorch() {
  if (!html5QrCode) return;
  try {
    torchOn = !torchOn;
    await html5QrCode.applyVideoConstraints({
      advanced: [{ torch: torchOn }]
    });
    const btn = document.getElementById('btnTorch');
    if (torchOn) {
      btn.classList.add('on');
      btn.textContent = '💡';
    } else {
      btn.classList.remove('on');
      btn.textContent = '🔦';
    }
  } catch (e) {
    // Torch not supported on this device — silently ignore
    console.log('Torch not supported:', e);
  }
}

// Reset torch state when scanner closes
const _origCloseScanner = closeScanner;

// ═══════════════════════════════════════════
//  AUDIO FEEDBACK
// ═══════════════════════════════════════════

function playSound(type) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    if (type === 'success') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    } else if (type === 'warning') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.setValueAtTime(380, ctx.currentTime + 0.15);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
    }
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.35);
  } catch (e) {}
}
